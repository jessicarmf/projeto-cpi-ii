<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto CPI II - Jéssica Freitas</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Espaço Beleza - Makeup </h1>
        <p>Bem-vinda ao Espaço Beleza!</p> <br>
        <p>Nosso salão é especializado em maquiagem </p>
    </header>

    <main>
        <p>Oferecemos os seguintes serviços:</p>
        <ul>
            <li>Maquiagem</li>
            <li>Coloração</li>
            <li>Manicure</li>
            <li>Pedicure</li>
        </ul>

        <img src="maquiagem_colorida.jpg" alt="Maquiagem colorida" width="300" />
        
        <h1>Agende seu horário</h1>
        <div> 
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required> <br>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" name="telefone" required> <br>

            <label for="servico">Serviço:</label>
            <select id="servico" name="servico" required> <br>
                <option value="">Selecione um serviço</option>
                <option value="corte">Maquiagem</option>
                <option value="pintura">Coloração</option>
                <option value="manicure">Manicure</option>
                <option value="pedicure">Pedicure</option>
            </select>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por <a href="https://github.com/jessicarmf" target="_blank">Jéssica Freitas</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
